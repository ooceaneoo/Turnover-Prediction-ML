name: CI - Turnover Prediction

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: turnover_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d turnover_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/turnover_db

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Créer les tables PostgreSQL
        run: |
          python create_db.py

      - name: Entraîner le modèle pour les tests
        run: |
          PYTHONPATH=src python -m turnover_ml.train

      - name: Exécuter les tests avec couverture
        run: |
          python -m pytest --cov=app --cov=src --cov-report=term-missing
